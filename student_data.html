<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos del Estudiante</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background-color: #add8e6;
            padding: 1rem;
        }
        .container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }
        .student-photo {
            width: 200px;
            height: 250px;
            border-radius: 15px;
            object-fit: cover;
            border: 4px solid #add8e6;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .content {
            flex: 1;
        }
        h1 { color: #1e3a8a; margin-bottom: 1.5rem; font-size: 1.6rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; color: #333; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.95rem; }
        input { 
            width: 100%; padding: 0.7rem; border: 2px solid #e0e0e0; 
            border-radius: 10px; font-size: 1rem; transition: all 0.3s ease; 
        }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .btn { 
            width: 100%; padding: 0.8rem; border: none; border-radius: 10px; 
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            background: linear-gradient(135deg, #10b981, #059669); color: white;
            margin-top: 1rem;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16,185,129,0.3); }
        .success-message { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; padding: 1rem; border-radius: 10px; 
            text-align: center; margin-top: 1rem; display: none; 
        }
        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; text-align: center; }
            .student-photo { width: 160px; height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://images.unsplash.com/photo-1519345182560-3f2917c472ef?w=300&h=400&fit=crop&crop=face" alt="Foto del estudiante" class="student-photo">
        <div class="content">
            <h1>📝 Datos del Estudiante</h1>
            <form id="userForm">
                <div class="form-group">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre">
                </div>
                <div class="form-group">
                    <label for="cedula">Cédula de Identidad:</label>
                    <input type="text" id="cedula" placeholder="V-12345678">
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email">
                </div>
                <div class="form-group">
                    <label for="telefono">Número Telefónico:</label>
                    <input type="tel" id="telefono" placeholder="0414-1234567">
                </div>
                <div class="form-group">
                    <label for="edad">Edad:</label>
                    <input type="number" id="edad" min="1" max="100">
                </div>
                <button type="submit" class="btn">💾 Actualizar Datos</button>
                <div id="successMessage" class="success-message">
                    ✅ Datos guardados exitosamente en tu dispositivo
                </div>
                <p style="margin-top: 1.5rem; color: #666; font-size: 0.9rem;">
                    <a href="password.html" style="color: #3b82f6; text-decoration: none;">← Volver a Verificación</a>
                </p>
            </form>
        </div>
    </div>
    <script>
        // Cargar datos guardados
        function loadSavedData() {
            const saved = localStorage.getItem('studentData');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('nombre').value = data.nombre || '';
                document.getElementById('cedula').value = data.cedula || '';
                document.getElementById('email').value = data.email || '';
                document.getElementById('telefono').value = data.telefono || '';
                document.getElementById('edad').value = data.edad || '';
            }
        }
        loadSavedData();

        // Guardar datos
        document.getElementById('userForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const userData = {
                nombre: document.getElementById('nombre').value,
                cedula: document.getElementById('cedula').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                edad: document.getElementById('edad').value
            };
            localStorage.setItem('studentData', JSON.stringify(userData));
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(() => document.getElementById('successMessage').style.display = 'none', 3000);
        });
    </script>
</body>
</html>
