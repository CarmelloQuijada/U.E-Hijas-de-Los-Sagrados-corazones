<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Acceso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #add8e6;
        }
        .container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: slideIn 0.8s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        h1 { color: #1e3a8a; margin-bottom: 1.5rem; font-size: 1.8rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; color: #333; margin-bottom: 0.5rem; font-weight: 500; }
        input { 
            width: 100%; padding: 0.75rem; border: 2px solid #e0e0e0; 
            border-radius: 10px; font-size: 1rem; transition: all 0.3s ease; 
        }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); transform: translateY(-2px); }
        .btn { 
            width: 100%; padding: 0.75rem; border: none; border-radius: 10px; 
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            background: linear-gradient(135deg, #3b82f6, #1e40af); color: white;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59,130,246,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 Verificar Acceso</h1>
        <form id="passwordForm">
            <div class="form-group">
                <label for="password">Ingresa la contraseña:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Entrar</button>
        </form>
    </div>
    <script>
        document.getElementById('passwordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('password').value === '123456') {
                window.location.href = 'student_data.html';
            } else {
                alert('❌ Contraseña incorrecta');
            }
        });
    </script>
</body>
</html>
